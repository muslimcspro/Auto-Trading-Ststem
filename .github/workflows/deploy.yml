name: Deploy to trading71.uk

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: trading71-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
      VPS_USER: ${{ secrets.VPS_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          set -euo pipefail
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_SSH_KEY_B64:?VPS_SSH_KEY_B64 secret is required}"
          PORT="${VPS_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/trading71_vps
          chmod 600 ~/.ssh/trading71_vps
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          PORT="${VPS_PORT:-22}"
          ssh -p "$PORT" -i ~/.ssh/trading71_vps "$VPS_USER@$VPS_HOST" <<'EOF'
            set -euo pipefail
            cd /opt/trading71
            git pull --ff-only
            docker compose -f docker-compose.oracle.yml up -d --build
            docker compose -f docker-compose.oracle.yml ps
          EOF
