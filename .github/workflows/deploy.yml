name: Deploy to trading71.uk

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: trading71-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/trading71_vps
          chmod 600 ~/.ssh/trading71_vps
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -p "${{ secrets.VPS_PORT || '22' }}" -i ~/.ssh/trading71_vps "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
            set -euo pipefail
            cd /opt/trading71
            git pull --ff-only
            docker compose -f docker-compose.oracle.yml up -d --build
            docker compose -f docker-compose.oracle.yml ps
          EOF
