steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/trading-system/app:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/trading-system/app:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - trading-system
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/trading-system/app:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - '8080'
      - --memory
      - 1Gi
      - --cpu
      - '1'
      - --min-instances
      - '1'
      - --set-env-vars
      - NODE_ENV=production
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/trading-system/app:$COMMIT_SHA
